name: Deploy GitHub Wiki

on:
  workflow_dispatch:
  push:
    paths:
      - "examples/github-wiki/docs/**"
      - ".github/workflows/ci.wiki.yml"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Publish documentation to wiki
        env:
          GH_PERSONAL_ACCESS_TOKEN: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN }}
          GIT_TERMINAL_PROMPT: "0"
        run: |
          if [ -z "$GH_PERSONAL_ACCESS_TOKEN" ]; then
            echo "::error::The GH_PERSONAL_ACCESS_TOKEN repository secret is not configured."
            exit 1
          fi

          token_status="$(
            curl --silent --output /dev/null --write-out "%{http_code}" \
              --header "Authorization: Bearer ${GH_PERSONAL_ACCESS_TOKEN}" \
              https://api.github.com/user
          )"
          if [ "$token_status" != "200" ]; then
            echo "::error::GH_PERSONAL_ACCESS_TOKEN was rejected by GitHub (HTTP ${token_status}). Replace the secret with a valid, unexpired token."
            exit 1
          fi

          wiki_url="https://github.com/${GITHUB_REPOSITORY}.wiki.git"
          auth_header="AUTHORIZATION: basic $(printf '%s:%s' "$GITHUB_ACTOR" "$GH_PERSONAL_ACCESS_TOKEN" | base64 --wrap=0)"
          echo "::add-mask::$auth_header"

          if ! git -c "http.extraheader=$auth_header" ls-remote "$wiki_url" HEAD >/dev/null; then
            echo "::error::The token is valid but cannot access this wiki. For a fine-grained PAT, select this repository, grant Contents read/write, and approve it for the organization. For a classic PAT, grant the repo scope and authorize SSO if required."
            exit 1
          fi

          git -c "http.extraheader=$auth_header" clone --depth 1 "$wiki_url" wiki

          rsync --archive --delete --exclude=".git" \
            examples/github-wiki/docs/ \
            wiki/

          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all

          if git diff --cached --quiet; then
            echo "Wiki is already up to date."
            exit 0
          fi

          git commit -m "Automatically publish wiki"
          git -c "http.extraheader=$auth_header" push origin HEAD
